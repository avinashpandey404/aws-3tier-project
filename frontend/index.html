<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS 3-Tier Architecture</title>

    <!-- CSS FILE -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>AWS 3-Tier Architecture Project</h1>

        <!-- USER FORM -->
        <form id="userForm">

            <input
                type="text"
                id="name"
                placeholder="Enter Name"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
                required
            >

            <button type="submit">
                Add User
            </button>

        </form>

        <!-- USERS SECTION -->
        <h2>Users List</h2>

        <ul id="userList"></ul>

    </div>

    <!-- JAVASCRIPT FILE -->
    <script src="script.js"></script>

</body>
</html>
